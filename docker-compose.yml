name: agentshield

volumes:
  postgres_data:
  redis_data:

networks:
  agentshield-net:
    driver: bridge

services:
  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    networks:
      - agentshield-net
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agentshield}
      POSTGRES_USER: ${POSTGRES_USER:-agentshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentshield}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentshield}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - agentshield-net
    command: redis-server
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  nats:
    image: nats:2.10-alpine
    networks:
      - agentshield-net
    command: ["--jetstream", "--http_port", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz > /dev/null"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Application services
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    networks:
      - agentshield-net
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-agentshield}
      POSTGRES_USER: ${POSTGRES_USER:-agentshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentshield}
      GATEWAY_PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health > /dev/null"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  runtime:
    build:
      context: ./runtime
      dockerfile: Dockerfile
    networks:
      - agentshield-net
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  security-engine:
    build:
      context: ./security-engine
      dockerfile: Dockerfile
    networks:
      - agentshield-net
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  sandbox-manager:
    build:
      context: ./sandbox-manager
      dockerfile: Dockerfile
    networks:
      - agentshield-net
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/health > /dev/null"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    networks:
      - agentshield-net
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped
