global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['gateway:8080']

  - job_name: runtime
    static_configs:
      - targets: ['runtime:8000']

  - job_name: security-engine
    static_configs:
      - targets: ['security-engine:8001']
